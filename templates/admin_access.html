<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Verification</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
        }
        .container {
            max-width: 560px;
            margin: 40px auto;
            background: #ffffff;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        h1 { margin-bottom: 8px; font-size: 28px; color: #111827; }
        .subtitle { margin-bottom: 24px; color: #6b7280; }
        .error, .success {
            margin-bottom: 18px;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 14px;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
        .success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }
        .detail-box {
            margin-bottom: 18px;
            padding: 12px 14px;
            border-radius: 10px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
        }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }
        input:focus { border-color: #2563eb; }
        .button-group { display: flex; gap: 10px; margin-top: 10px; }
        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #1d4ed8; }
        .back-link {
            display: inline-block;
            margin-top: 14px;
            color: #2563eb;
            text-decoration: none;
        }
        .logo-top-corner {
            position: absolute;
            top: 20px;
            right: 20px;
            max-height: 60px;
            width: auto;
        }

        @media (max-width: 768px) {
            .logo-top-corner {
                position: static;
                display: block;
                margin: 20px auto 0 auto;
                max-height: 50px;
            }
        }
    </style>
</head>
<body>
    <img src="/hathisidheecement_logo.jpg" alt="Hathi Sidhee Cement Logo" class="logo-top-corner">
    <div class="container">
        <h1>Admin Verification</h1>
        <p class="subtitle">Enter the admin password to continue.</p>

        <div class="detail-box">
            <strong>Complaint ID:</strong> {{ complaint.complaint_id if complaint else complaint_id }}
        </div>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        {% if success %}
            <div class="success">{{ success }}</div>
        {% endif %}

        <form method="post" action="{{ request.url_for('assign_access') }}">
            <input type="hidden" name="token" value="{{ token }}">
            <label for="password">Admin Password</label>
            <input type="password" id="password" name="password" required>
            <div class="button-group">
                <button type="submit">Continue</button>
            </div>
        </form>

        <a class="back-link" href="/">Back to form</a>
    </div>
</body>
</html>
