<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acknowledgement Result</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
        }

        .container {
            max-width: 560px;
            margin: 40px auto;
            background: #ffffff;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .app-logo {
            width: 240px;
            max-width: 100%;
            height: auto;
            object-fit: contain;
            display: block;
        }

        h1 {
            margin-bottom: 8px;
            font-size: 28px;
            color: #111827;
        }

        .subtitle {
            margin-bottom: 24px;
            color: #6b7280;
        }

        .success {
            margin-bottom: 18px;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 14px;
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
            text-align: left;
        }

        a.button {
            display: inline-block;
            text-align: center;
            padding: 14px 20px;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
        }

        a.button:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo-container">
            <img src="/hathisidheecement_logo.jpg" alt="Hathi Sidhee Cement Logo" class="app-logo">
        </div>
        <h1>{{ title }}</h1>
        <p class="subtitle">Your response has been recorded successfully.</p>

        <div class="success">
            {{ message }}
        </div>


    </div>
</body>

</html>
